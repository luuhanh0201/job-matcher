services:
  web:
    container_name: next-web
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

  api:
    container_name: nest-api
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env.development
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    container_name: redis-cache
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
